<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="/img/favicon.ico">
    <link rel="icon" type="image/png" href="/img/favicon.png">
    <link rel="apple-touch-icon" href="/img/favicon.png">
    <title>Orlando Cogo — CV</title>
    <meta name="description" content="CV d'Orlando Cogo — étudiant Bachelor Informatique cybersécurité Ynov Campus, ex-Airbus. Disponible en téléchargement.">
    <link rel="canonical" href="https://orlandocogo.com/cv">
    <meta property="og:url" content="https://orlandocogo.com/cv">
    <meta property="og:title" content="Orlando Cogo — CV">
    <meta property="og:description" content="CV d'Orlando Cogo — étudiant cybersécurité Ynov Campus, ex-Airbus. Téléchargeable.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Mono:ital,wght@0,400;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/nav.css">
    <link rel="stylesheet" href="/css/cv.css">
</head>
<body>

<div class="blob1"></div>
<div class="blob2"></div>
<div class="grid"></div>
<div class="corner corner--tl"></div>
<div class="corner corner--tr"></div>
<div class="corner corner--bl"></div>
<div class="corner corner--br"></div>

<canvas id="matrix" class="matrix-canvas"></canvas>

<nav class="nav">
    <a href="/home" class="nav-logo"><span class="prompt">~/</span>orlando.cogo</a>
    <ul class="nav-links">
        <li><a href="/about" class="nav-link">À propos</a></li>
        <li><a href="/skills" class="nav-link">Compétences</a></li>
        <li><a href="/project" class="nav-link">Projets</a></li>
        <li><a href="/contact" class="nav-link">Contact</a></li>
        <li><a href="/cv" class="nav-link">CV</a></li>
        <li class="nav-more">
            <button class="nav-more-btn" id="navMoreBtn">
                Plus
                <svg width="10" height="10" viewBox="0 0 10 10" fill="none"><path d="M2 3.5L5 6.5L8 3.5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg>
            </button>
            <div class="nav-more-menu" id="navMoreMenu">
                <a href="/status" class="more-item"><span class="more-num">06</span><span class="more-info"><span class="more-name">Status</span><span class="more-desc">État du système</span></span></a>
                <a href="/faq" class="more-item"><span class="more-num">07</span><span class="more-info"><span class="more-name">FAQ</span><span class="more-desc">Questions / Réponses</span></span></a>
            </div>
        </li>
    </ul>
    <button class="nav-burger" id="navBurger"><span></span><span></span><span></span></button>
    <div class="nav-right">
        <!-- Bouton télécharger dans nav-right -->
        <a href="/img/cv/cv.png" class="cv-btn" download="CV_Orlando_Cogo.png">
            <svg width="13" height="13" viewBox="0 0 13 13" fill="none"><path d="M6.5 1v7M6.5 8l-2.5-2.5M6.5 8L9 5.5M1 11h11" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg>
            Télécharger
        </a>
        <div class="nav-status"><span class="status-dot"></span><span>open to work</span></div>
    </div>
</nav>

<!-- HAUT DE LA PAGE -->
<section class="hero">
    <div class="hero-tag" data-typed="cat cv.md">
        <span class="prompt">~/cv $</span>
        <span class="typed"></span>
        <span class="cursor"></span>
    </div>
    <h1 class="hero-title">Mon<br><span class="outline">CV</span></h1>
    <p class="hero-intro">Présentation de mon cv · <span style="color:var(--accent)">Téléchargeable</span> en haut de la page</p>
</section>

<!-- CV INTERACTIF -->
<section class="section">
    <div class="cv-layout">
        <!-- CV image -->
        <div class="cv-container">
            <div class="cv-wrapper" id="cvWrapper">
                <img src="/img/cv/cv.png" alt="CV Orlando Cogo" class="cv-img" id="cvImg" draggable="false">
            </div>
        </div>
    </div>
</section>

<!-- BAS DE LA PAGE -->
<footer class="footer">
    <span class="prompt">~/orlando.cogo $</span>
    <span>cat cv.pdf</span>
    <a href="/home" class="footer-back">← Retour à l'accueil</a>
    <span class="footer-year">© 2026</span>
</footer>

<script src="/js/background.js"></script>
<script src="/js/nav.js"></script>
<script src="/js/cv.js"></script>
</body>
</html>
