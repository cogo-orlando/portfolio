# ══════════════════════════════════════════
#  DOCKER COMPOSE — Développement
#  Usage : docker compose -f docker-compose.dev.yml up
# ══════════════════════════════════════════
services:

  portfolio:
    build:
      context: .
      dockerfile: Dockerfile.dev
    image: portfolio:dev
    container_name: portfolio_dev
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      PORT: "8080"
      TZ: "Europe/Paris"
    volumes:
      # Monte tout le projet pour le hot-reload Air
      - .:/app
      # Exclut le dossier tmp d'Air du montage
      - /app/tmp
    # Pas de healthcheck en dev pour ne pas polluer les logs