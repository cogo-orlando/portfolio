services:

  # ── Portfolio — Mode Production ───────────────────────────────────────────────
  portfolio:
    build:
      context: .
      dockerfile: Dockerfile         # Utilise le Dockerfile de prod optimisé
    container_name: portfolio
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      PORT: "8080"
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-changeme}
    volumes:
      - portfolio_data:/app/data     # Persiste les messages JSON
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  portfolio_data:
    driver: local