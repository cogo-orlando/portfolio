name: CI — Tests Go

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    name: Tests Go
    runs-on: ubuntu-latest

    steps:
      # 1. Récupère le code
      - name: Checkout
        uses: actions/checkout@v4
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

      # 2. Configure Go
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache: false
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

      # 3. Vérifie que le code compile
      - name: Build
        run: go build ./...

      # 4. Lance tous les tests
      - name: Tests
        run: go test ./server/handler/... ./server/middleware/... -v

      # 5. Couverture de code
      - name: Couverture
        run: go test ./server/handler/... ./server/middleware/... -coverprofile=coverage.out

      - name: Affiche la couverture
        run: go tool cover -func=coverage.out

      # 6. Scan sécurité gosec
      - name: Gosec Security Scan
        run: |
            go install github.com/securego/gosec/v2/cmd/gosec@latest
            gosec ./...

      # 7. Purge cache Cloudflare
      - name: Purge Cloudflare Cache
        run: |
          curl -X POST "https://api.cloudflare.com/client/v4/zones/${{ secrets.CF_ZONE_ID }}/purge_cache" \
                     -H "Authorization: Bearer ${{ secrets.CF_API_TOKEN }}" \
                     -H "Content-Type: application/json" \
                     --data '{"purge_everything":true}'