# ══════════════════════════════════════════
#  DOCKER COMPOSE — Production
#  Usage : docker compose up -d
# ══════════════════════════════════════════
services:

  portfolio:
    build:
      context: .
      dockerfile: Dockerfile
    image: portfolio:latest
    container_name: portfolio
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      PORT: "8080"
      TZ: "Europe/Paris"
    volumes:
      # Persiste les données (messages JSON) entre les redémarrages
      - portfolio_data:/data
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost:8080/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    # Limite les ressources (Render Free = 512MB RAM)
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 64M
    # Logs JSON structurés — compatible avec slog
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  portfolio_data:
    driver: local