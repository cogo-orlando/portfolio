name: CI — Tests Go

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    name: Tests Go
    runs-on: ubuntu-latest

    steps:
      # 1. Récupère le code
      - name: Checkout
        uses: actions/checkout@v4

      # 2. Configure Go
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache: true

      # 3. Vérifie que le code compile
      - name: Build
        run: go build ./...

      # 4. Lance tous les tests
      - name: Tests
        run: go test ./server/handler/... ./server/middleware/... -v

      # 5. Couverture de code
      - name: Couverture
        run: go test ./server/handler/... ./server/middleware/... -coverprofile=coverage.out

      - name: Affiche la couverture
        run: go tool cover -func=coverage.out