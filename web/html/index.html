<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Orlando Cogo</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Mono:ital,wght@0,400;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>

<div class="blob1"></div>
<div class="blob2"></div>
<div class="grid"></div>

<div class="corner corner--tl"></div>
<div class="corner corner--tr"></div>
<div class="corner corner--bl"></div>
<div class="corner corner--br"></div>

<div class="terminal-bar">
    <div class="dot dot-r"></div>
    <div class="dot dot-y"></div>
    <div class="dot dot-g"></div>
    <span class="terminal-title">orlando@portfolio ~ %</span>
</div>

<div class="wrapper">

    <div class="typing-tag">
        <span class="prompt">~/portfolio $</span>
        <span>whoami</span>
        <span class="cursor"></span>
    </div>

    <h1 class="name">
        <span class="name-first">Orlando</span>
        <span class="name-last">Cogo</span>
    </h1>

    <p class="accroche">
        Étudiant en <em>Bachelor Informatique</em> · Spécialisation <em>Cybersécurité</em><br>
        Explorer les systèmes pour mieux les défendre.
    </p>

    <div class="stats">
        <div class="stat">
            <span class="stat-value">B1</span>
            <span class="stat-label">Bachelor</span>
        </div>
        <div class="stat-divider"></div>
        <div class="stat">
            <span class="stat-value">CTF</span>
            <span class="stat-label">Passionné</span>
        </div>
        <div class="stat-divider"></div>
        <div class="stat">
            <span class="stat-value">SEC</span>
            <span class="stat-label">Spécialité</span>
        </div>
    </div>

    <div class="cta-wrapper">
        <a href="/home" class="cta">
            <span>Accéder au portfolio</span>
            <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
                <path d="M2 7H12M12 7L8 3M12 7L8 11" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
        </a>
    </div>

</div>

<div class="status">
    <div class="status-dot"></div>
    <span>Système en ligne — 2026</span>
</div>

<script src="/js/index.js"></script>
</body>
</html>
