<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- ── SEO ── -->
    <title>Orlando Cogo — Étudiant Cybersécurité & Développeur Go</title>
    <meta name="description" content="Portfolio d'Orlando Cogo, étudiant en Bachelor Informatique spécialisation Cybersécurité à Ynov Campus Toulouse. Développeur Go, passionné par la sécurité des systèmes.">
    <meta name="author" content="Orlando Cogo">
    <meta name="robots" content="index, follow">
    <link rel="canonical" href="https://orlandocogo.com">

    <!-- ── Open Graph ── -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://orlandocogo.com">
    <meta property="og:title" content="Orlando Cogo — Étudiant Cybersécurité & Développeur Go">
    <meta property="og:description" content="Portfolio d'Orlando Cogo, étudiant en Bachelor Informatique spécialisation Cybersécurité à Ynov Campus Toulouse.">
    <meta property="og:image" content="https://orlandocogo.com/img/og-image.png">
    <meta property="og:locale" content="fr_FR">

    <!-- ── Twitter Card ── -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Orlando Cogo — Étudiant Cybersécurité & Développeur Go">
    <meta name="twitter:description" content="Portfolio d'Orlando Cogo, étudiant en Bachelor Informatique spécialisation Cybersécurité à Ynov Campus Toulouse.">
    <meta name="twitter:image" content="https://orlandocogo.com/img/og-image.png">

    <!-- ── Favicon ── -->
    <link rel="icon" href="/img/favicon.ico">
    <link rel="icon" type="image/png" href="/img/favicon.png">
    <link rel="apple-touch-icon" href="/img/favicon.png">

    <!-- ── Fonts ── -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Mono:ital,wght@0,400;1,400&display=swap" rel="stylesheet">

    <!-- ── CSS ── -->
    <link rel="stylesheet" href="/css/nav.css">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>

<div class="blob1" aria-hidden="true"></div>
<div class="blob2" aria-hidden="true"></div>
<div class="grid" aria-hidden="true"></div>
<div class="corner corner--tl" aria-hidden="true"></div>
<div class="corner corner--tr" aria-hidden="true"></div>
<div class="corner corner--bl" aria-hidden="true"></div>
<div class="corner corner--br" aria-hidden="true"></div>
<canvas id="matrix" class="matrix-canvas" aria-hidden="true"></canvas>

<div class="terminal-bar" aria-hidden="true">
    <div class="dot dot-r"></div>
    <div class="dot dot-y"></div>
    <div class="dot dot-g"></div>
    <span class="terminal-title">orlando@portfolio</span>
</div>

<main id="main-content" class="wrapper">

    <div class="typing-tag" aria-hidden="true">
        <span class="prompt">~/portfolio $</span>
        <span>whoami</span>
        <span class="cursor"></span>
    </div>

    <h1 class="name">
        <span class="name-first">Orlando</span>
        <span class="name-last">Cogo</span>
    </h1>

    <p class="accroche">
        Étudiant en <em>Bachelor Informatique</em> au <em>Campus d'Ynov à Toulouse</em> · Spécialisation <em>Cybersécurité</em><br>
        <em>"Sécuriser aujourd'hui pour innover sereinement demain."</em>
    </p>

    <div class="stats" aria-label="Informations clés">
        <div class="stat">
            <span class="stat-value">B1</span>
            <span class="stat-label">Bachelor</span>
        </div>
        <div class="stat-divider" aria-hidden="true"></div>
        <div class="stat">
            <span class="stat-value">CYBER</span>
            <span class="stat-label">Spécialité</span>
        </div>
    </div>

    <div class="cta-wrapper">
        <a href="/home" class="cta" aria-label="Accéder au portfolio d'Orlando Cogo">
            <span>Accéder au portfolio</span>
            <svg width="14" height="14" viewBox="0 0 14 14" fill="none" aria-hidden="true">
                <path d="M2 7H12M12 7L8 3M12 7L8 11" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
        </a>
    </div>

</main>

<div class="status" aria-label="Statut du système">
    <div class="status-dot" aria-hidden="true"></div>
    <span>Système en ligne — 2026</span>
</div>

<script src="/js/background.js"></script>
<script type="module" src="/js/index.js"></script>
</body>
</html>
